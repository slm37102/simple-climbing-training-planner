<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1e293b">
<title>Climbing Training Planner</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Climbing Planner</h1>
    <nav id="tabs" class="tabs">
      <button data-view="today" class="tab active">Today</button>
      <button data-view="week" class="tab">Week</button>
      <button data-view="calendar" class="tab">Cycle</button>
      <button data-view="benchmarks" class="tab">Benchmarks</button>
      <button data-view="log" class="tab">Log</button>
      <button data-view="plans" class="tab">Plans</button>
      <button data-view="settings" class="tab">Settings</button>
    </nav>
    <div id="syncStatus" class="sync-status" aria-live="polite">offline</div>
  </header>

  <main id="view" class="view"></main>

  <div id="authGate" class="auth-gate hidden" role="dialog" aria-modal="true">
    <div class="auth-card">
      <h2>Welcome</h2>
      <p>Sign in with Google to sync across devices, or use the app locally only.</p>
      <button id="signInBtn" class="primary">Sign in with Google</button>
      <button id="localOnlyBtn" class="ghost">Use locally only</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
