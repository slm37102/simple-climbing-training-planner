<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0C0E12">
<title>Ascent — Climbing Training Planner</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Ascent</h1>
    <div id="syncStatus" class="sync-status" aria-live="polite">offline</div>
  </header>

  <main id="view" class="view"></main>

  <nav id="tabs" class="tabs" aria-label="Main">
    <button data-view="today" class="tab active" aria-label="Today">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"></circle><line x1="12" y1="2" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="22"></line><line x1="2" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="22" y2="12"></line></svg>
      <span>Today</span>
    </button>
    <button data-view="cycle" class="tab" aria-label="Cycle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="3"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="16" y1="2" x2="16" y2="6"></line></svg>
      <span>Cycle</span>
    </button>
    <button data-view="log" class="tab" aria-label="Log">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="20" x2="6" y2="13"></line><line x1="12" y1="20" x2="12" y2="5"></line><line x1="18" y1="20" x2="18" y2="15"></line></svg>
      <span>Log</span>
    </button>
    <button data-view="profile" class="tab" aria-label="Profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="7" r="4"></circle><path d="M4 21v-1a8 8 0 0 1 16 0v1"></path></svg>
      <span>Profile</span>
    </button>
  </nav>

  <div id="authGate" class="auth-gate hidden" role="dialog" aria-modal="true" aria-labelledby="authGateTitle">
    <div class="auth-card">
      <h2 id="authGateTitle">Ascent</h2>
      <p class="muted">Sign in with Google to sync across devices, or use the app locally only.</p>
      <button id="signInBtn" class="primary">Sign in with Google</button>
      <button id="localOnlyBtn" class="ghost">Use locally only</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
