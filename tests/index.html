import { Storage, newer } from '../js/storage.js';
import { Program, buildPhasePattern, DEFAULT_CYCLE_WEEKS, MIN_CYCLE_WEEKS, MAX_CYCLE_WEEKS } from '../js/program.js';

const results = document.getElementById('results');
const summaryEl = document.getElementById('summary');

const tests = [];
function test(name, fn) { tests.push({ name, fn }); }
function assert(cond, msg) { if (!cond) throw new Error(msg || 'Assertion failed'); }
function assertEq(actual, expected, msg) {
  const a = JSON.stringify(actual), b = JSON.stringify(expected);
  if (a !== b) throw new Error(`${msg || 'assertEq failed'}: expected ${b}, got ${a}`);
}

function localIso(d) {
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}

function addIsoDays(iso, days) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return localIso(d);
}

function resetStorage() {
  localStorage.clear();
  sessionStorage.clear();
  Storage.reset();
}

});

  assertEq(v, { kg: false, sets: true, reps: true, rpe: true, optional: false, none: false });
});

test('inputVisibility test → kg+reps+rpe (no sets — single effort)', () => {

  assertEq(v, { kg: true, sets: false, reps: true, rpe: true, optional: false, none: false });
});

test('inputVisibility arc → reps+rpe (min, no sets/kg)', () => {
  const v = inputVisibility({ kind: 'arc' });
  assertEq(v, { kg: false, sets: false, reps: true, rpe: true, optional: false, none: false });
  assertEq(repsLabel({ kind: 'arc' }), 'min');

test('inputVisibility optional flag overrides → checkbox only', () => {

test('Today: default pre-fill is NOT persisted until user touches that field', () => {
  resetStorage();
  const plan = Storage.getActivePlan();
  Storage.setPlanSettings(plan.id, { anchorMode: 'startDate', startDate: '2026-05-04' });
  Storage.setGlobalBenchmarks({ bodyweight: 70, maxHang20mm: 25, pullup1RM: 40 });
  sessionStorage.setItem('todaySelectedDate', '2026-06-15');
  const root = document.createElement('div');
  document.body.appendChild(root);
  try {
    renderToday(root);
    // User only changes RPE — kg/sets/reps stay as their default values.
    const rpeEl = root.querySelector('#ex-0-rpe');
    rpeEl.value = '8.5';
    rpeEl.removeAttribute('data-default');
    rpeEl.dispatchEvent(new Event('change', { bubbles: true }));

    const back = Storage.getDay('2026-06-15');
    assert(back, 'day not persisted');
    assertEq(back.exercises[0].actual.rpe, 8.5, 'rpe should be persisted (user touched it)');
    assert(back.exercises[0].actual.kg   == null, 'kg must NOT be persisted (still pre-fill default)');
    assert(back.exercises[0].actual.sets == null, 'sets must NOT be persisted (still pre-fill default)');
    assert(back.exercises[0].actual.reps == null, 'reps must NOT be persisted (still pre-fill default)');
  } finally { root.remove(); }
});

// ─── Configurable cycle length ────────────────────────────────────────────

test('buildPhasePattern(12) preserves single-block shape (6 base, 3 build, 2 peak, 1 taper)', () => {
  const p = buildPhasePattern(12);
  assertEq(p.length, 12);
  const counts = { base: 0, build: 0, peak: 0, taper: 0 };
  p.forEach(w => counts[w.phase]++);
  assertEq(counts, { base: 6, build: 3, peak: 2, taper: 1 });
  // retest = end of base (week 6)
  assert(p[5].retest, 'wk6 should be retest');
  assert(p[5].deload, 'wk6 should be deload (retest implies deload reset)');
  // deload cadence — every 3rd week within base/build
  assert(p[2].deload, 'wk3 should be deload');
  assert(p[8].deload, 'wk9 should be deload (end of build)');
});

test('buildPhasePattern(8) shortest single-block', () => {
  const p = buildPhasePattern(8);
  assertEq(p.length, 8);
  assertEq(p[p.length - 1].phase, 'taper');
  assertEq(p[p.length - 2].phase, 'peak');
  assertEq(p[p.length - 3].phase, 'peak');
});

test('buildPhasePattern(16) single-block scaled', () => {
  const p = buildPhasePattern(16);
  assertEq(p.length, 16);
  const counts = { base: 0, build: 0, peak: 0, taper: 0 };
  p.forEach(w => counts[w.phase]++);
  assert(counts.peak === 2, 'peak fixed at 2');
  assert(counts.taper === 2, 'taper grows to 2 when weeks ≥ 14');
  assert(counts.base >= 2 * counts.build, 'base should dominate over build');
});

test('buildPhasePattern(24) switches to double-block', () => {
  const p = buildPhasePattern(24);
  assertEq(p.length, 24);
  // double-block = two base→build cycles before peak
  const sequence = p.map(w => w.phase).join(',');
  // count base→build transitions
  let transitions = 0;
  for (let i = 1; i < p.length; i++) {
    if (p[i - 1].phase === 'base' && p[i].phase === 'build') transitions++;
  }
  assertEq(transitions, 2, 'double-block has two base→build transitions');
});

test('buildPhasePattern clamps out-of-range weeks', () => {
  assertEq(buildPhasePattern(4).length, MIN_CYCLE_WEEKS);
  assertEq(buildPhasePattern(100).length, MAX_CYCLE_WEEKS);
});

test('Program.resolveDate with cycleWeeks=16 keeps day 100 inside cycle', () => {
  const ctx = Program.resolveDate('2026-08-12', '2026-05-04', 16);
  assert(ctx && !ctx.outOfCycle, 'should be inside 16-wk cycle');
  assertEq(ctx.cycleWeeks, 16);
  assertEq(ctx.totalDays, 112);
});

test('Program.resolveDate with default cycleWeeks=12 → same day is outOfCycle', () => {
  const ctx = Program.resolveDate('2026-08-12', '2026-05-04');
  assert(!ctx || ctx.outOfCycle, '12-wk cycle ends much earlier');
});

test('Program.cycleWeeksOf falls back to default when settings missing', () => {
  assertEq(Program.cycleWeeksOf({}), DEFAULT_CYCLE_WEEKS);
  assertEq(Program.cycleWeeksOf({ cycleWeeks: 20 }), 20);
  assertEq(Program.cycleWeeksOf({ cycleWeeks: 5 }), MIN_CYCLE_WEEKS); // clamped
});

// ─── Deload semantics (volume cut, intensity held) ───────────────────────

test('Deload week (non-retest) sets deloadNote and cuts prescribedSets ~40%', () => {
  // wk3 of 12-wk cycle = deload but NOT retest (retest is wk6 in new pattern)
  const ctx = Program.resolveDate('2026-05-18', '2026-05-04', 12); // start Mon 2026-05-04, wk3 Mon
  assert(ctx.deload && !ctx.retest, 'wk3 should be deload-only');
  assertEq(ctx.weekIdx, 3);
  const sess = Program.prescribeForContext(ctx, 'hybrid');
  assert(sess.deloadNote && /volume/i.test(sess.deloadNote), 'session should have deloadNote');
  // find the weighted pullup (started at 5 sets)
  const pull = sess.exercises.find(e => e.kind === 'pullup');
  assert(pull, 'should have pullup');
  assert(pull.prescribedSets < 5, `pullup sets should be cut, got ${pull.prescribedSets}`);
  assert(pull.prescribedSets >= 1, 'should be ≥1');
});

test('Retest week skips volume cut (it has its own structure)', () => {
  // wk6 of 12-wk cycle = retest
  const ctx = Program.resolveDate('2026-06-08', '2026-05-04', 12);
  assertEq(ctx.weekIdx, 6);
  assert(ctx.retest, 'wk6 should be retest');
  const sess = Program.prescribeForContext(ctx, 'hybrid');
  assert(!sess.deloadNote, 'retest week should not emit volume-cut note');
});

test('Cycle: summary card shows week progress + cycle bests', () => {
  resetStorage();
  const plan = Storage.getActivePlan();
  const now = new Date();
  const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dow = monday.getDay();
  monday.setDate(monday.getDate() - (dow === 0 ? 6 : dow - 1));
  const start = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate());
  start.setDate(start.getDate() - 7);
  const startIso = localIso(start);
  const weekStartIso = localIso(monday);

  Storage.setPlanSettings(plan.id, { anchorMode: 'startDate', startDate: startIso });
  Storage.setDay(weekStartIso, {
    exercises: [{ name: 'Hangboard', kind: 'hangboard', actual: { kg: 25, rpe: 8 } }]
  });
  Storage.setDay(addIsoDays(startIso, 1), {
    exercises: [{ name: 'Retest', kind: 'test', actual: { kg: 30, reps: 1, rpe: 9 } }]
  });

function makeWednesday() {
  // A deterministic non-Monday anchor (walk forward to the first Wednesday).
  const d = new Date('2026-06-01T00:00:00');
  while (d.getDay() !== 3) d.setDate(d.getDate() + 1);
  return localIso(d);
}
function nextCalendarMonday(iso) {
  const d = new Date(iso + 'T00:00:00');
  do { d.setDate(d.getDate() + 1); } while (d.getDay() !== 1);
  return localIso(d);
}

test('[Phase1 C1] effectiveStart snaps a non-Monday startDate to Monday', () => {
  const wed = makeWednesday(); // 2026-06-03, a Wednesday
  const start = Program.effectiveStart({ anchorMode: 'startDate', startDate: wed, cycleWeeks: 12 });
  assert(start, 'effectiveStart returned null');
  const dow = new Date(start + 'T00:00:00').getDay();
  assertEq(dow, 1, `effectiveStart should snap to a Monday (got ${start}, dow ${dow}) — see C1`);
});

test('[Phase1 C1] Mon/Thu/Sat of one calendar week share weekIdx/phase/flavor (non-Monday anchor)', () => {
  const wed = makeWednesday();
  const cw = 12;
  const start = Program.effectiveStart({ anchorMode: 'startDate', startDate: wed, cycleWeeks: cw });
  const mon = nextCalendarMonday(wed);
  const thu = addIsoDays(mon, 3);
  const sat = addIsoDays(mon, 5);
  const rMon = Program.resolveDate(mon, start, cw);
  const rThu = Program.resolveDate(thu, start, cw);
  const rSat = Program.resolveDate(sat, start, cw);
  assert(rMon && !rMon.outOfCycle && rThu && !rThu.outOfCycle && rSat && !rSat.outOfCycle, 'all three days should resolve inside the cycle');
  assertEq(rThu.weekIdx, rMon.weekIdx, `Thu must share Mon's weekIdx within one calendar week — see C1`);
  assertEq(rSat.weekIdx, rMon.weekIdx, `Sat must share Mon's weekIdx within one calendar week — see C1`);
  assertEq(rSat.phase, rMon.phase, 'phase must be constant across one calendar week');
  assertEq(rSat.flavor, rMon.flavor, 'flavor must be constant across one calendar week');
});

// ─── Runner ───────────────────────────────────────────────────────────────

async function runAll() {
  results.innerHTML = '';
  summaryEl.className = 'summary';
  summaryEl.textContent = `Running ${tests.length} tests…`;
  let pass = 0, fail = 0;
  for (const t of tests) {
    const row = document.createElement('div');
    row.className = 'case';
    try {
      await t.fn();
      row.classList.add('pass');
      row.innerHTML = `<div class="name">✓ ${t.name}</div>`;
      pass++;
    } catch (e) {
      row.classList.add('fail');
      const msg = (e && (e.stack || e.message)) || String(e);
      row.innerHTML = `<div class="name">✗ ${t.name}</div><div class="err"></div>`;
      row.querySelector('.err').textContent = msg;
      fail++;
    }
    results.appendChild(row);
  }
  summaryEl.className = 'summary ' + (fail === 0 ? 'allpass' : 'anyfail');
  summaryEl.textContent = `${pass} passed, ${fail} failed (${tests.length} total)`;
}

document.getElementById('run').addEventListener('click', runAll);
document.getElementById('clear').addEventListener('click', () => {
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
});

runAll();
</script>
