const tests = [];
function test(name, fn) { tests.push({ name, fn }); }
function assert(cond, msg) { if (!cond) throw new Error(msg || 'Assertion failed'); }
function assertEq(actual, expected, msg) {
  const a = JSON.stringify(actual), b = JSON.stringify(expected);
  if (a !== b) throw new Error(`${msg || 'assertEq failed'}: expected ${b}, got ${a}`);
}

function localIso(d) {
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}

function addIsoDays(iso, days) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return localIso(d);
}

function resetStorage() {
  localStorage.clear();
  sessionStorage.clear();
  Storage.reset();
}

test('Today: default pre-fill is NOT persisted until user touches that field', () => {

  const plan = Storage.getActivePlan();
  Storage.setPlanSettings(plan.id, { anchorMode: 'startDate', startDate: '2026-05-04' });
  Storage.setGlobalBenchmarks({ bodyweight: 70, maxHang20mm: 25, pullup1RM: 40 });

  document.body.appendChild(root);

// ─── Configurable cycle length ────────────────────────────────────────────

test('buildPhasePattern(12) preserves single-block shape (6 base, 3 build, 2 peak, 1 taper)', () => {
  const p = buildPhasePattern(12);
  assertEq(p.length, 12);
  const counts = { base: 0, build: 0, peak: 0, taper: 0 };
  p.forEach(w => counts[w.phase]++);
  assertEq(counts, { base: 6, build: 3, peak: 2, taper: 1 });
  // retest = end of base (week 6)
  assert(p[5].retest, 'wk6 should be retest');
  assert(p[5].deload, 'wk6 should be deload (retest implies deload reset)');
  // deload cadence — every 4th week within base/build (3:1 — ADR-0004)
  assert(p[3].deload, 'wk4 should be deload');
  assert(!p[2].deload, 'wk3 should NOT be deload under 3:1');
  assert(!p[8].deload, 'wk9 should NOT be deload (3-wk build has no natural deload)');
});

test('buildPhasePattern(8) shortest single-block', () => {
  const p = buildPhasePattern(8);
  assertEq(p.length, 8);
  assertEq(p[p.length - 1].phase, 'taper');
  assertEq(p[p.length - 2].phase, 'peak');
  assertEq(p[p.length - 3].phase, 'peak');
});

test('buildPhasePattern(16) single-block scaled', () => {
  const p = buildPhasePattern(16);
  assertEq(p.length, 16);
  const counts = { base: 0, build: 0, peak: 0, taper: 0 };
  p.forEach(w => counts[w.phase]++);
  assert(counts.peak === 2, 'peak fixed at 2');
  assert(counts.taper === 1, 'comp taper stays 1 wk regardless of length (ADR-0007)');
  assert(counts.base >= 2 * counts.build, 'base should dominate over build');
});

test('buildPhasePattern peakType scales taper: comp 1 wk, trip/project 2 wk (ADR-0007)', () => {
  const taperWeeks = p => p.filter(w => w.phase === 'taper').length;
  assertEq(taperWeeks(buildPhasePattern(12, 'comp')), 1);
  assertEq(taperWeeks(buildPhasePattern(12, 'trip')), 2);
  assertEq(taperWeeks(buildPhasePattern(12, 'project')), 2);
  assertEq(taperWeeks(buildPhasePattern(12)), 1, 'default peakType is comp');
});

test('buildPhasePattern(24) switches to double-block', () => {
  const p = buildPhasePattern(24);
  assertEq(p.length, 24);
  // double-block = two base→build cycles before peak
  const sequence = p.map(w => w.phase).join(',');
  // count base→build transitions
  let transitions = 0;
  for (let i = 1; i < p.length; i++) {
    if (p[i - 1].phase === 'base' && p[i].phase === 'build') transitions++;
  }
  assertEq(transitions, 2, 'double-block has two base→build transitions');
});

test('buildPhasePattern clamps out-of-range weeks', () => {
  assertEq(buildPhasePattern(4).length, MIN_CYCLE_WEEKS);
  assertEq(buildPhasePattern(100).length, MAX_CYCLE_WEEKS);
});

test('Program.cycleWeeksOf falls back to default when settings missing', () => {

test('[ADR-0008] REGRESSION: accepting the extend action never pushes "today" outside the cycle', () => {
  // Caught by adversarial review: an earlier ceil()-based shiftDays could push
  // effectiveStart PAST today whenever the anchor was the raw (unlogged) cycle
  // start and gapDays wasn't an exact multiple of 7 — stranding the athlete on
  // an "Outside cycle" screen for days after clicking "Extend plan."
  // Sweep every gap size from the major threshold up through several weeks —
  // for each one, applying the offered shift must leave "today" resolvable.
  for (let gapDays = MAJOR_GAP_DAYS; gapDays <= 30; gapDays++) {
    const todayIso = addIsoDays('2026-05-04', gapDays);
    const plan = { createdAt: '2026-05-04', settings: { anchorMode: 'startDate', startDate: '2026-05-04', cycleWeeks: 12 }, days: {} };
    const gap = Replan.detectGap(plan, todayIso);
    assert(gap && gap.canShift, `gapDays=${gapDays}: expected a shiftable major gap`);
    assert(gap.shiftDays <= gapDays, `gapDays=${gapDays}: shiftDays (${gap.shiftDays}) must not exceed gapDays`);

    const shiftedStart = Program.effectiveStart({ ...plan.settings, scheduleShiftDays: gap.shiftDays });
    const ctx = Program.resolveDate(todayIso, shiftedStart, 12);
    assert(ctx && !ctx.outOfCycle,
      `gapDays=${gapDays}: shiftDays=${gap.shiftDays} pushed effectiveStart to ${shiftedStart}, ` +
      `making today (${todayIso}) unresolvable (${JSON.stringify(ctx)})`);
    assert(ctx.diffDays >= 0 && ctx.diffDays < 7,
      `gapDays=${gapDays}: post-shift offset should land within the first week (got diffDays=${ctx.diffDays})`);
  }
});

function makeWednesday() {
  // A deterministic non-Monday anchor (walk forward to the first Wednesday).
  const d = new Date('2026-06-01T00:00:00');
  while (d.getDay() !== 3) d.setDate(d.getDate() + 1);
  return localIso(d);
}
function nextCalendarMonday(iso) {
  const d = new Date(iso + 'T00:00:00');
  do { d.setDate(d.getDate() + 1); } while (d.getDay() !== 1);
  return localIso(d);
}

// ─── KG-B11a: clamp negative-benchmark load prescriptions (closes #36) ────
// Negative benchmarks (assisted hangs/pull-ups) are inverted: more-negative =
// more assisted = easier; less-negative (closer to zero) = less assisted =
// harder. %-of-benchmark math shrinks magnitude toward zero, which for a
// negative baseMax computes a HARDER value than the athlete's own tested max.
// No computed bound (initial range or final suggestedKg) may ever exceed the
// benchmark in the harder direction. Positive benchmarks must see zero change.

test('[KG-B11a] prescribeLoadKg clamps both bounds when a negative-benchmark % range is entirely harder than the benchmark', () => {
  // 55–70% of a -10kg benchmark computes -5.5/-7kg — both less negative (harder)
  // than the athlete's tested -10kg max. Both bounds must clamp down to -10kg.
  const exercise = { kind: 'hangboard', loadPctRange: [0.55, 0.70] };
  const benchmarks = { maxHang20mm: -10, bodyweight: 70 };
  const result = Loads.prescribeLoadKg(exercise, benchmarks);
  assertEq(result.baseMax, -10, 'prescribeLoadKg must return baseMax so callers can thread it through');
  assertEq(result.addedKgRange, [-10, -10], 'both bounds are harder than -10kg and must clamp to it');
  assertEq(result.totalKgRange, [60, 60], 'total system weight must be derived from the same clamped bounds (70 + -10)');
});

test('[KG-B11a] prescribeLoadKg clamps only the bound that is harder than benchmark, leaves the easier bound untouched', () => {
  // 90–110% of a -10kg benchmark: lo=-9 (harder, must clamp to -10), hi=-11
  // (easier than -10kg already, must be left alone).
  const exercise = { kind: 'hangboard', loadPctRange: [0.9, 1.1] };
  const benchmarks = { maxHang20mm: -10 };
  const result = Loads.prescribeLoadKg(exercise, benchmarks);
  assertEq(result.addedKgRange, [-11, -10], 'harder bound (-9) clamps to -10; easier bound (-11) is unaffected');
});

test('[KG-B11a] resolveEffective clamps a previousActualKg-progression path that would otherwise land harder than the negative benchmark', () => {
  // previousActualKg is already at the tested max (-10kg). A stale (60-day)
  // layoff decay of ×0.85 shrinks the magnitude toward zero (-8.5kg — harder!,
  // the opposite of what layoff decay is supposed to do for an assisted lift).
  // Even after the existing +5% session cap (which also shrinks magnitude in
  // this direction, landing at -9kg), the result is still harder than the
  // -10kg benchmark and must be clamped back to it.
  const exercise = { kind: 'hangboard', loadPctRange: [0.55, 0.70], rpeRange: [8, 9] };
  const benchmarks = { maxHang20mm: -10 };
  const res = Loads.resolveEffective({
    exercise, previousActualKg: -10, previousAvgRpe: 8.5, daysSincePrevious: 60, benchmarks
  });
  assertEq(res.suggestedKg, -10, 'progression math must never suggest a load harder than the tested -10kg max');
  assert(res.reason.some(r => /clamped to benchmark/i.test(r) && /negative-benchmark safety cap/i.test(r)),
    `reason trail must record the clamp engaging, got: ${JSON.stringify(res.reason)}`);
});

test('[KG-B11a] clamp holds across real program.js phase tables (Base intro, Build, Peak, taper) for a negative benchmark', () => {
  // Every HANGBOARD/BASE_MAX_INTRO loadPctRange in program.js is entirely < 1
  // (e.g. Build's [0.80, 0.90]), so against a negative baseMax every one of
  // these real, program-built sessions must fully clamp to the benchmark.
  const benchmarks = { maxHang20mm: -10, bodyweight: 70 };
  const fixtures = [
    ['2026-05-04', 'hybrid'],          // wk1 Mon, base intro hangboard
    ['2026-06-15', 'boulder'],         // wk7 Mon, build max-weight 10s hangboard
    ['2026-07-06', 'boulder'],         // wk10 Mon, peak 7-53 protocol hangboard
    ['2026-07-20', 'boulder', 'comp'], // wk12 Mon (comp taper), near-max taper hangboard
  ];
  let checked = 0;
  for (const [iso, focus, peakType] of fixtures) {
    const ctx = Program.resolveDate(iso, '2026-05-04', 12, peakType);
    const sess = Program.prescribeForContext(ctx, focus);
    for (const ex of (sess.exercises || [])) {
      if (ex.kind !== 'hangboard' || !ex.loadPctRange) continue;
      const base = Loads.prescribeLoadKg(ex, benchmarks);
      assert(base, `${iso}/${focus}: expected prescribeLoadKg to resolve for "${ex.name}"`);
      assert(base.addedKgRange[0] <= -10 + 1e-9 && base.addedKgRange[1] <= -10 + 1e-9,
        `${iso}/${focus}: "${ex.name}" range ${JSON.stringify(base.addedKgRange)} must never exceed -10kg benchmark`);
      const resolved = Loads.resolveEffective({ exercise: ex, previousActualKg: null, benchmarks });
      assert(resolved.suggestedKg <= -10 + 1e-9,
        `${iso}/${focus}: "${ex.name}" suggestedKg ${resolved.suggestedKg} must never exceed -10kg benchmark`);
      checked++;
    }
  }
  assert(checked >= 3, `expected to check at least 3 real hangboard sessions across phases, got ${checked}`);
});

test('[KG-B11a] positive benchmarks are completely unaffected by the clamp, including a previousActualKg that exceeds a stale benchmark (PR)', () => {
  const exercise = { kind: 'hangboard', loadPctRange: [0.5, 0.7], rpeRange: [8, 9] };
  const benchmarks = { maxHang20mm: 20, bodyweight: 70 };

  const range = Loads.prescribeLoadKg(exercise, benchmarks);
  assertEq(range.addedKgRange, [10, 14], 'positive-benchmark range must be untouched by the clamp');

  // PR case: previousActualKg (25) exceeds the stale positive benchmark (20).
  // This is a legitimate upward progression, not a bug — must not be clamped.
  const pr = Loads.resolveEffective({
    exercise, previousActualKg: 25, previousAvgRpe: 8.5, daysSincePrevious: 5, benchmarks
  });
  assertEq(pr.suggestedKg, 25, 'a PR exceeding a stale positive benchmark must progress untouched');
  assert(!pr.reason.some(r => /clamped to benchmark/i.test(r)), 'positive-benchmark path must never mention the clamp');
});

  const emptyStrings = Program.prescribeForContext(ctx, 'boulder', { dominantStyle: '', dominantAngle: '' });
  assert(!emptyStrings.styleNote, 'empty-string style/angle must not add a styleNote');

  const nullFields = Program.prescribeForContext(ctx, 'boulder', { dominantStyle: null, dominantAngle: null });
  assert(!nullFields.styleNote, 'null style/angle must not add a styleNote');

  const unknown = Program.prescribeForContext(ctx, 'boulder', { dominantStyle: 'nope', dominantAngle: 'nope' });
  assert(!unknown.styleNote, 'unrecognised style/angle values must not add a styleNote');
});

  assert(!taperThu.styleNote, 'Taper Thursday must never carry the anti-style cue');

});

// ─── Runner ───────────────────────────────────────────────────────────────

async function runAll() {
  results.innerHTML = '';
  summaryEl.className = 'summary';
  summaryEl.textContent = `Running ${tests.length} tests…`;
  let pass = 0, fail = 0;
  for (const t of tests) {
    const row = document.createElement('div');
    row.className = 'case';
    try {
      await t.fn();
      row.classList.add('pass');
      row.innerHTML = `<div class="name">✓ ${t.name}</div>`;
      pass++;
    } catch (e) {
      row.classList.add('fail');
      const msg = (e && (e.stack || e.message)) || String(e);
      row.innerHTML = `<div class="name">✗ ${t.name}</div><div class="err"></div>`;
      row.querySelector('.err').textContent = msg;
      fail++;
    }
    results.appendChild(row);
  }
  summaryEl.className = 'summary ' + (fail === 0 ? 'allpass' : 'anyfail');
  summaryEl.textContent = `${pass} passed, ${fail} failed (${tests.length} total)`;
}

document.getElementById('run').addEventListener('click', runAll);
document.getElementById('clear').addEventListener('click', () => {
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
});

runAll();
</script>
