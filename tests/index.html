<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Climbing Planner — Smoke Tests</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.4rem; }
  .summary { margin: 12px 0; padding: 10px; border-radius: 8px; background: #1e293b; font-weight: 600; }
  .summary.allpass { background: #14532d; }
  .summary.anyfail { background: #7f1d1d; }
  .case { padding: 8px 12px; margin: 4px 0; border-radius: 6px; background: #1e293b; border-left: 4px solid #475569; }
  .case.pass { border-left-color: #22c55e; }
  .case.fail { border-left-color: #ef4444; }
  .case .name { font-weight: 600; }
  .case .err  { font-size: .8rem; color: #fca5a5; margin-top: 4px; white-space: pre-wrap; font-family: ui-monospace, monospace; }
  button { background: #2563eb; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-right: 8px; }
  button.danger { background: #dc2626; }
  a { color: #60a5fa; }
</style>
</head>
<body>
<h1>Smoke Tests</h1>
<p><a href="../index.html">← Back to app</a> — these tests mutate localStorage. Click "Clear" before returning to the app to avoid surprises.</p>
<p>
  <button id="run">Run tests</button>
  <button class="danger" id="clear">Clear storage &amp; reload</button>
</p>
<div id="summary" class="summary">Loading…</div>
<div id="results"></div>

<script type="module">
// The suite itself lives in tests/cases/*.js (one file per domain area,
// original section order preserved); this page is just the shell. To add a
// case: pick the matching cases/ file, or add a new one and import it below.
import { runAll } from './harness.js';
import './cases/01-inputs-storage.js';
import './cases/02-today-view.js';
import './cases/03-log-view.js';
import './cases/04-program-core.js';
import './cases/05-replan.js';
import './cases/06-gym-ready.js';
import './cases/07-progression-templates.js';
import './cases/08-drills.js';
import './cases/09-calendar-view.js';
import './cases/10-phase-regressions.js';
import './cases/11-loads-taper.js';
import './cases/12-style-cues.js';
import './cases/13-hybrid-total-load.js';
import './cases/14-limiter-benchmark-refresh.js';
import './cases/15-monitoring.js';
import './cases/16-readiness-gating.js';
import './cases/17-deepening-refactors.js';

document.getElementById('run').addEventListener('click', runAll);
document.getElementById('clear').addEventListener('click', () => {
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
});

runAll();
</script>
</body>
</html>
